name: CI

on:
  workflow_dispatch:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm agents:check
      - run: pnpm lint:scripts
      - run: pnpm test:scripts
      - run: pnpm format:check
      - run: go vet ./...
      - run: go test ./...
      - run: go test -race ./...
      - run: pnpm build
      - run: scripts/with-tools node scripts/dogfood-cli.mjs --mode smoke --skip-build --binary bin/contribution

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest

  vulnerability:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true
      - name: Run govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  preflight-action:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: ./
        with:
          base: origin/main
          head: HEAD
          output-dir: .contribution/preflight
          fail-on-risk: never
          version: local

  goreleaser-snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: .go-version
          cache: true
      - uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: latest
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
