name: Setup Node + pnpm

description: Standardized Node and pnpm bootstrap for CI/nightly workflows.

inputs:
  node-version:
    description: Node.js version to install
    required: false
    default: "24.16.0"
  run-install:
    description: Whether to run pnpm install with retries
    required: false
    default: "true"
  cache-pnpm-store:
    description: Whether to cache pnpm store for faster dependency installs
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: ${{ inputs.node-version }}

    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093
      with:
        run_install: false

    - name: Configure pnpm via corepack
      shell: bash
      run: |
        corepack enable
        corepack install
        pnpm --version

    - name: Resolve pnpm store path
      if: ${{ inputs.cache-pnpm-store == 'true' }}
      id: pnpm-store
      shell: bash
      run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Restore pnpm store cache
      if: ${{ inputs.cache-pnpm-store == 'true' }}
      id: pnpm-store-cache
      uses: actions/cache/restore@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-${{ inputs.node-version }}-
          ${{ runner.os }}-pnpm-store-

    - name: Install dependencies (retry up to 5 times)
      if: ${{ inputs.run-install == 'true' }}
      shell: bash
      run: |
        for attempt in 1 2 3 4 5; do
          pnpm install --frozen-lockfile && exit 0
          if [[ "$attempt" -lt 5 ]]; then
            sleep_seconds="$((attempt * 15))"
            echo "pnpm install failed on attempt ${attempt}; retrying in ${sleep_seconds}s..."
            sleep "${sleep_seconds}"
          fi
        done
        echo "pnpm install failed after 5 attempts."
        exit 1

    - name: Save pnpm store cache
      if: >-
        ${{
          inputs.cache-pnpm-store == 'true' &&
          inputs.run-install == 'true' &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
          steps.pnpm-store-cache.outputs.cache-hit != 'true'
        }}
      shell: bash
      run: pnpm store prune

    - name: Persist pruned pnpm store cache
      if: >-
        ${{
          inputs.cache-pnpm-store == 'true' &&
          inputs.run-install == 'true' &&
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
          steps.pnpm-store-cache.outputs.cache-hit != 'true'
        }}
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: ${{ runner.os }}-pnpm-store-${{ inputs.node-version }}-${{ hashFiles('pnpm-lock.yaml') }}
