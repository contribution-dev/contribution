name: Review Remediation

on:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  remediation:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null &&
      github.event.workflow_run.head_repository.full_name == github.event.repository.full_name
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: ./.github/actions/setup-node-pnpm
        with:
          run-install: "false"
      - name: Dispatch remediation agent
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REMEDIATION_WEBHOOK_URL: ${{ secrets.REMEDIATION_WEBHOOK_URL }}
          REMEDIATION_WEBHOOK_TOKEN: ${{ secrets.REMEDIATION_WEBHOOK_TOKEN }}
        run: |
          node scripts/risk-policy/review-remediation-dispatch.mjs \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}"
      - name: Upload remediation report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: review-remediation-dispatch
          path: output/test-metrics/review-remediation-dispatch.json
          if-no-files-found: ignore
          retention-days: 1
