name: Review Auto Resolve Threads

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read
  checks: read
  pull-requests: write

jobs:
  auto-resolve:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.pull_requests[0].number != null &&
      github.event.workflow_run.head_repository.full_name == github.event.repository.full_name
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.repository.default_branch }}
      - uses: ./.github/actions/setup-node-pnpm
        with:
          run-install: "false"
      - name: Resolve bot-only review threads
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          PR_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          node scripts/risk-policy/auto-resolve-bot-threads.mjs \
            --owner "${{ github.repository_owner }}" \
            --repo "${{ github.event.repository.name }}"
      - name: Upload auto-resolve report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: auto-resolve-threads
          path: output/test-metrics/auto-resolve-threads.json
          if-no-files-found: ignore
          retention-days: 1
